# S46 P1 (BUG-CRITICAL-5) — Playwright 2-browser E2E harness CI workflow.
#
# Runs on every push to master + every PR. Spec at e2e/smoke.spec.ts drives
# 2 separate Chromium contexts (= 2 WebRTC peers over real Trystero/Nostr
# signaling) and asserts the full lobby → match-start → place → bond flow.
#
# Migration plan:
#   S46 — separate workflow, non-blocking (continue-on-error: false but
#         no deploy.yml dependency yet). The 5 per-Sym tests ship as
#         test.fixme() initially; CI passes on the baseline test only.
#   S47+ — as each Sym fix lands, the corresponding test.fixme() flips to
#         test() and CI starts gating. When all 5 are green + stable, add
#         a `needs: [e2e]` to deploy.yml so failed E2E blocks deploy.
#
# Path filter mirrors deploy.yml — skip e2e on session-bookkeeping commits
# (.claude/, HANDOFF_*.md, etc) to avoid wasting CI minutes on docs.

name: E2E (2-browser harness)

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'e2e/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

# E2E is independent of deploy; no shared concurrency group needed.
# Cancel in-progress runs on rapid pushes to save CI minutes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run e2e
        # S46 P7 — advisory (non-blocking) for the first CI runs while we
        # validate that 2-peer Trystero/Nostr WebRTC handshake works in
        # GH Actions networking. Once stable, remove continue-on-error
        # so failures block deploy.
        continue-on-error: true
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
