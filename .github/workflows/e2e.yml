# S46 P1 (BUG-CRITICAL-5) — Playwright 2-browser E2E harness CI workflow.
#
# Runs on every push to master + every PR. Spec at e2e/smoke.spec.ts drives
# 2 separate Chromium contexts (= 2 WebRTC peers over real Trystero/Nostr
# signaling) and asserts the full lobby → match-start → place → bond flow.
#
# Path filter mirrors deploy.yml — skip e2e on session-bookkeeping commits
# (.claude/, HANDOFF_*.md, etc) to avoid wasting CI minutes on docs.
#
# S98 P1 — FLAKE QUARANTINE, now split into TWO JOBS (was two steps in one job):
#   • job `e2e`            — GATING. Runs everything EXCEPT @quarantine-flaky
#                            (--grep-invert). A red here == a real regression.
#   • job `e2e-quarantine` — NON-GATING. Runs ONLY @quarantine-flaky, the real
#                            multi-peer WebRTC tests that fail in the CI sandbox
#                            on net::ERR_ADDRESS_UNREACHABLE (it can't hold P2P
#                            data channels). It carries `continue-on-error: true`
#                            AT JOB LEVEL, so even when it fails/times out the
#                            workflow-run conclusion stays SUCCESS → no failure
#                            emails and it can never cancel/red the gating job.
#
#   Why a separate JOB, not a step: previously both lanes lived in one job, so
#   the quarantine lane's slow real-WebRTC retries (90–120s × playwright
#   retries:2) overran the single 15m cap → the WHOLE job was cancelled →
#   mooted the already-passed gating step → emailed the user. Separate jobs run
#   on separate runners with independent timeouts, so the quarantine lane is
#   fully isolated.
#
#   Quarantine = explicit opt-IN: a test GATES by default; you must add the
#   ` @quarantine-flaky` tag to its describe title to move it to the non-gating
#   job (Playwright --grep / --grep-invert match the full test title). The
#   quarantine job uses a separate --output dir + --reporter=list so it never
#   overwrites the gating lane's HTML report/traces and its flakes emit no
#   GitHub annotations. Deterministic transport is rejected (playwright.config
#   C9 + LOCKED_DECISIONS: real Trystero/Nostr P2P IS the surface under test);
#   de-flaking WebRTC-in-CI is tracked as a carry-forward, not done here.
#
#   master is currently NOT branch-protected (no required status checks), so the
#   gating signal is advisory; the job is named `e2e` so that if/when branch
#   protection is added, the required check can point at the gating job.

name: E2E (2-browser harness)

on:
  # S110 — REMOVED the per-push trigger. This 2-job Playwright harness ran ~35 min on EVERY push to
  # master and exhausted the PRIVATE repo's free GitHub Actions minutes — the spending-limit cap that
  # blocked all S110 deploys (startup_failure / 0 jobs) AND spammed failure emails (two per push: this
  # + the Pages deploy). It now runs on a WEEKLY schedule + on PRs + on-demand, catching regressions
  # without the per-push minute drain. The cheap deploy.yml (Pages, ~2 min) still runs on every push,
  # unchanged — so code still deploys on push (once the spending cap is lifted). Run a one-off check
  # anytime via the Actions tab → "E2E (2-browser harness)" → Run workflow (workflow_dispatch).
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC — weekly regression sweep
  pull_request:
    branches: [master]
  workflow_dispatch:

# E2E is independent of deploy; no shared concurrency group needed.
# Cancel in-progress runs on rapid pushes to save CI minutes. Both jobs share
# this group, so a new push cancels the whole in-progress run (cancelled != failed).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GATING lane — everything EXCEPT @quarantine-flaky. A failure here is a REAL
  # regression and reds the run (the whole point of the quarantine split).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E (gating — excludes @quarantine-flaky)
        run: npm run e2e:gating
        env:
          CI: 'true'

      - name: Upload Playwright report (gating)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # NON-GATING quarantine lane — ONLY @quarantine-flaky (multi-peer real-WebRTC).
  # `continue-on-error: true` at JOB level => its failure/timeout NEVER fails the
  # workflow run (no failure emails); independent runner + timeout => it can never
  # cancel the gating job. It still RUNS + is visible (a consistent real regression
  # is still catchable) but cannot gate.
  e2e-quarantine:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E (quarantine — @quarantine-flaky only, non-gating)
        run: npm run e2e:quarantine
        env:
          CI: 'true'

      - name: Upload quarantine results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-quarantine-results
          path: test-results-quarantine/
          retention-days: 14
          if-no-files-found: ignore
