# S46 P1 (BUG-CRITICAL-5) — Playwright 2-browser E2E harness CI workflow.
#
# Runs on every push to master + every PR. Spec at e2e/smoke.spec.ts drives
# 2 separate Chromium contexts (= 2 WebRTC peers over real Trystero/Nostr
# signaling) and asserts the full lobby → match-start → place → bond flow.
#
# Migration plan:
#   S46 — separate workflow, non-blocking (continue-on-error: false but
#         no deploy.yml dependency yet). The 5 per-Sym tests ship as
#         test.fixme() initially; CI passes on the baseline test only.
#   S47+ — as each Sym fix lands, the corresponding test.fixme() flips to
#         test() and CI starts gating. When all 5 are green + stable, add
#         a `needs: [e2e]` to deploy.yml so failed E2E blocks deploy.
#
# Path filter mirrors deploy.yml — skip e2e on session-bookkeeping commits
# (.claude/, HANDOFF_*.md, etc) to avoid wasting CI minutes on docs.
#
# S65 P3 — flake quarantine: the Run-E2E step is split into a GATING lane
# (--grep-invert "@quarantine-flaky"; a red here == a real regression) and a
# NON-GATING lane (continue-on-error; --grep "@quarantine-flaky") for the
# 4-peer real-WebRTC nplayer test, a recurring CI timeout flake (S63 P3 + S64
# P1; 90s x retries under CI network load). The test carries the
# @quarantine-flaky tag in its describe title — explicit opt-IN, so new tests
# GATE by default (you must tag to quarantine). It still runs + is visible
# (catches a CONSISTENT real regression) but cannot red the gate. The quarantine
# lane uses a separate --output dir + --reporter=list so it never overwrites the
# gating lane's HTML report / traces (the artifact on a real regression stays
# correct) and its flakes emit no GitHub annotations. Deterministic transport is
# rejected (playwright.config C9: real Trystero/Nostr P2P IS the surface under
# test). N-player correctness stays gating via the nplayerSeating units + the
# fast/stable 6-player-render e2e.

name: E2E (2-browser harness)

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'e2e/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

# E2E is independent of deploy; no shared concurrency group needed.
# Cancel in-progress runs on rapid pushes to save CI minutes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # GATING lane — everything EXCEPT the flaky 4-peer real-WebRTC test.
      # A failure here is a REAL regression and reds the job (the point of the
      # quarantine: gating-CI-red == real regression).
      - name: Run E2E (gating)
        run: npm run e2e -- --grep-invert "@quarantine-flaky"
        env:
          CI: 'true'

      # NON-GATING quarantine lane — the 4-peer real-WebRTC nplayer test only.
      # continue-on-error keeps its recurring CI timeout flake from reding the
      # job; if:always() runs it even when the gating lane failed (diagnostics).
      - name: Run E2E (4-peer real-WebRTC - non-gating quarantine)
        if: always()
        continue-on-error: true
        # Separate --output dir + list reporter so this lane NEVER overwrites the
        # gating lane's playwright-report/ + test-results/ (the artifact on a real
        # regression stays the gating one) and flakes don't emit GitHub annotations.
        run: npm run e2e -- --grep "@quarantine-flaky" --output=test-results-quarantine --reporter=list
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
