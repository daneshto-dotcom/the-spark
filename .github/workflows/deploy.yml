# S16 P2 Step 1 — GitHub Pages deploy via the official Actions Pages path
# (actions/upload-pages-artifact@v5 + actions/deploy-pages@v5). Council R1
# Grok #4 + Gemini #2 adopted this over peaceiris/actions-gh-pages@v3 as
# GitHub's audited modern path.
#
# REQUIRED ONE-TIME USER STEP (per PRIME-AUDIT #2):
#   Settings → Pages → Source: select "GitHub Actions"
#   (NOT "Deploy from a branch" / "gh-pages")
#
# Live URL after first green run: https://daneshto-dotcom.github.io/the-spark/

name: Deploy to GitHub Pages

# S40 P2: paths filter so session-bookkeeping commits (.claude/, HANDOFF_*.md,
# reflexion_log.md, boot-snapshot.md) DON'T trigger deploys. Eliminates the
# cascade-cancel pattern where close/handoff/state-autocommit pushes within
# minutes of a code push would cancel the in-flight code deploy via the
# github-pages environment's built-in deployment concurrency (which overrides
# the workflow-level cancel-in-progress: false). Path list = exact set of
# files the `npm ci && npm run build` step reads: src/, public/, index.html,
# vite.config.ts, tsconfig.json, package*.json, plus this workflow file
# itself so changes here still trigger a verification deploy.
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# PRIME-AUDIT #1: deploy-pages@v4 requires these permissions
permissions:
  contents: read
  pages: write
  id-token: write

# S40 P1 defensive measure: rename concurrency group from "pages" to
# "pages-deploy" in case stuck workflow-level concurrency state on the old
# group name was preventing runner scheduling (a fresh workflow_dispatch on
# unchanged code sat in pending for 14+ min with no jobs ever picked up,
# even after clearing the phantom github-pages deployment via deployment
# statuses API). cancel-in-progress remains false — we want session-close
# pushes to queue not cancel each other, and the paths filter above is what
# prevents non-code pushes from triggering at all.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (vite + tsc)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # PRIME-AUDIT #1: environment binding required for deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
